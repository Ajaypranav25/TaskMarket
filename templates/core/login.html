{% extends 'core/base.html' %}
{% block title %}Log In — TaskMarket{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-mark">TM</span>
      <span>TaskMarket</span>
    </div>
    <h2 style="margin-bottom:6px">Welcome back</h2>
    <p class="text-sm text-muted" style="margin-bottom:28px">Log in to access your dashboard</p>

    {% if error %}
    <div class="message message--error" style="margin-bottom:16px; position:static; animation:none;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn--primary btn-full" style="margin-top:8px">Log In →</button>
    </form>

    <p class="text-sm text-muted" style="margin-top:24px; text-align:center;">
      Don't have an account? <a href="{% url 'register' %}" style="color:var(--amber)">Sign up</a>
    </p>
  </div>
</div>
{% endblock %}
